  <!-- Header -->
  <text x="80" y="100" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="16" font-weight="400" fill="#374151" letter-spacing="4">JWEBLY · OPERATIONAL INTELLIGENCE</text>
  <line x1="80" y1="120" x2="1000" y2="120" stroke="#1B2B45" stroke-width="1"/>
  <!-- Title -->
  <text x="80" y="230" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="100" font-weight="700" fill="white">What we</text>
  <text x="80" y="350" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="100" font-weight="700" fill="url(#tg)">believe.</text>
  <line x1="80" y1="400" x2="200" y2="400" stroke="#8A6CFF" stroke-width="3"/>
  <!-- Beliefs -->
  <text x="80" y="490" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" fill="#8A6CFF" letter-spacing="2">01</text>
  <text x="120" y="490" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="28" font-weight="600" fill="white">Automation must prove its value before you commit.</text>
  <line x1="80" y1="530" x2="1000" y2="530" stroke="#1B2B45" stroke-width="1"/>
  <text x="80" y="590" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" fill="#8A6CFF" letter-spacing="2">02</text>
  <text x="120" y="590" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="28" font-weight="600" fill="white">Every business deserves operational intelligence,</text>
  <text x="120" y="630" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="28" font-weight="600" fill="white">not just enterprise.</text>
  <line x1="80" y1="660" x2="1000" y2="660" stroke="#1B2B45" stroke-width="1"/>
  <text x="80" y="720" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" fill="#8A6CFF" letter-spacing="2">03</text>
  <text x="120" y="720" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="28" font-weight="600" fill="white">Your data stays yours. Always.</text>
  <line x1="80" y1="760" x2="1000" y2="760" stroke="#1B2B45" stroke-width="1"/>
  <text x="80" y="820" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" fill="#8A6CFF" letter-spacing="2">04</text>
  <text x="120" y="820" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="28" font-weight="600" fill="white">We build around your business,</text>
  <text x="120" y="860" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="28" font-weight="600" fill="white">not the other way around.</text>
  <line x1="80" y1="890" x2="1000" y2="890" stroke="#1B2B45" stroke-width="1"/>
  <text x="80" y="950" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" fill="#8A6CFF" letter-spacing="2">05</text>
  <text x="120" y="950" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="28" font-weight="600" fill="white">Transparency is not optional.</text>
  <text x="120" y="990" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="28" font-weight="600" fill="white">You approve before we build.</text>
  <line x1="80" y1="1020" x2="1000" y2="1020" stroke="#1B2B45" stroke-width="1"/>
  <!-- Bottom -->
  <text x="80" y="1130" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="36" font-weight="700" fill="url(#tg)">Business meets AI.</text>
  <text x="80" y="1185" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="22" font-weight="300" fill="#6B7280">The modern, seamless way to run your operations.</text>
