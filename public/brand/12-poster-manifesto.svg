  <text x="80" y="1316" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="400" fill="#374151">Joseph Enemuwe · Founder &amp; Solutions Architect</text>
  <text x="80" y="1346" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="16" font-weight="600" fill="#8A6CFF">jwebly.co.uk</text>
