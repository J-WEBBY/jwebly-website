  <line x1="540" y1="540" x2="540" y2="260" stroke="#8A6CFF" stroke-width="2.5" stroke-opacity="0.4"/>
  <line x1="540" y1="540" x2="820" y2="540" stroke="#8A6CFF" stroke-width="2.5" stroke-opacity="0.4"/>
  <line x1="540" y1="540" x2="540" y2="820" stroke="#8A6CFF" stroke-width="2.5" stroke-opacity="0.4"/>
  <line x1="540" y1="540" x2="260" y2="540" stroke="#8A6CFF" stroke-width="2.5" stroke-opacity="0.4"/>
  <!-- Secondary spokes (d=198, offset=140) -->
  <line x1="540" y1="540" x2="680" y2="400" stroke="#8A6CFF" stroke-width="1.5" stroke-opacity="0.24"/>
  <line x1="540" y1="540" x2="680" y2="680" stroke="#8A6CFF" stroke-width="1.5" stroke-opacity="0.24"/>
  <line x1="540" y1="540" x2="400" y2="680" stroke="#8A6CFF" stroke-width="1.5" stroke-opacity="0.24"/>
  <line x1="540" y1="540" x2="400" y2="400" stroke="#8A6CFF" stroke-width="1.5" stroke-opacity="0.24"/>
