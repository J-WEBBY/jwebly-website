  <text x="80" y="920" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="52" font-weight="700" fill="white">Business</text>
  <text x="80" y="985" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="52" font-weight="700" fill="url(#tg)">meets AI.</text>
