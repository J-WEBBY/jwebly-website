  <g fill="#1B2B45">
    <circle cx="120" cy="120" r="2"/><circle cx="240" cy="120" r="2"/><circle cx="360" cy="120" r="2"/>
    <circle cx="720" cy="120" r="2"/><circle cx="840" cy="120" r="2"/><circle cx="960" cy="120" r="2"/>
    <circle cx="120" cy="960" r="2"/><circle cx="240" cy="960" r="2"/><circle cx="360" cy="960" r="2"/>
    <circle cx="720" cy="960" r="2"/><circle cx="840" cy="960" r="2"/><circle cx="960" cy="960" r="2"/>
  </g>
  <defs>
