  <circle cx="540" cy="260" r="36" fill="url(#ng)" opacity="0.85"/>
  <circle cx="820" cy="540" r="36" fill="url(#ng)" opacity="0.85"/>
  <circle cx="540" cy="820" r="36" fill="url(#ng)" opacity="0.85"/>
  <circle cx="260" cy="540" r="36" fill="url(#ng)" opacity="0.85"/>
  <!-- Secondary nodes -->
  <circle cx="680" cy="400" r="23" fill="url(#ng)" opacity="0.55"/>
  <circle cx="680" cy="680" r="23" fill="url(#ng)" opacity="0.55"/>
  <circle cx="400" cy="680" r="23" fill="url(#ng)" opacity="0.55"/>
  <circle cx="400" cy="400" r="23" fill="url(#ng)" opacity="0.55"/>
