  <text x="540" y="130" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="22" font-weight="400" fill="#6B7280" letter-spacing="3" text-anchor="middle">JWEBLY</text>
  <text x="540" y="970" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="400" fill="#374151" letter-spacing="2" text-anchor="middle">jwebly.co.uk</text>
