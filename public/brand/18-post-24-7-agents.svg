  <line x1="540" y1="100" x2="540" y2="144" stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.45"/>
  <line x1="540" y1="100" x2="496" y2="100" stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.45"/>
  <line x1="540" y1="100" x2="571" y2="69"  stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.26"/>
  <line x1="540" y1="100" x2="571" y2="131" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.26"/>
  <line x1="540" y1="100" x2="509" y2="131" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.26"/>
  <line x1="540" y1="100" x2="509" y2="69"  stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.26"/>
  <circle cx="540" cy="56"  r="8"  fill="url(#ng)" opacity="0.9"/>
  <circle cx="584" cy="100" r="8"  fill="url(#ng)" opacity="0.9"/>
  <circle cx="540" cy="144" r="8"  fill="url(#ng)" opacity="0.9"/>
  <circle cx="496" cy="100" r="8"  fill="url(#ng)" opacity="0.9"/>
  <circle cx="571" cy="69"  r="5"  fill="url(#ng)" opacity="0.62"/>
  <circle cx="571" cy="131" r="5"  fill="url(#ng)" opacity="0.62"/>
  <circle cx="509" cy="131" r="5"  fill="url(#ng)" opacity="0.62"/>
  <circle cx="509" cy="69"  r="5"  fill="url(#ng)" opacity="0.62"/>
  <circle cx="540" cy="100" r="20" fill="url(#mg)"/>
  <!-- Center text in ring -->
  <text x="540" y="340" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="100" font-weight="700" fill="white" text-anchor="middle">24/7</text>
  <text x="540" y="400" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="22" font-weight="400" fill="#6B7280" text-anchor="middle">ALWAYS RUNNING</text>
  <!-- Below text -->
  <text x="80" y="740" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="54" font-weight="700" fill="white">Your agents don't</text>
  <text x="80" y="820" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="54" font-weight="700" fill="white">sleep, don't take</text>
  <text x="80" y="900" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="54" font-weight="700" fill="url(#tg)">holidays.</text>
  <line x1="80" y1="950" x2="600" y2="950" stroke="#1B2B45" stroke-width="1"/>
  <text x="80" y="1000" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="22" font-weight="400" fill="#4B5563">Every trigger handled. Every hour.</text>
  <text x="80" y="1048" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="16" font-weight="600" fill="#8A6CFF">JWEBLY · jwebly.co.uk</text>
