  <text x="80" y="920" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="22" font-weight="400" fill="#4B5563">£600 Pilot · £120/month retainer · Custom Full System</text>
  <text x="80" y="1050" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" fill="#8A6CFF">JWEBLY · jwebly.co.uk</text>
