  <!-- Quote -->
  <text x="80" y="250" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="52" font-weight="700" fill="white">The businesses that</text>
  <text x="80" y="330" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="52" font-weight="700" fill="white">thrive next decade</text>
  <text x="80" y="410" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="52" font-weight="700" fill="white">won't be the ones</text>
  <text x="80" y="490" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="52" font-weight="700" fill="white">who discovered AI</text>
  <text x="80" y="570" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="52" font-weight="700" fill="white">last. They'll be the</text>
  <text x="80" y="650" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="52" font-weight="700" fill="url(#tg)">ones who implemented</text>
  <text x="80" y="730" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="52" font-weight="700" fill="url(#tg)">it most effectively.</text>
