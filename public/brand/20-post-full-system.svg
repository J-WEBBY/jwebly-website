<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#050810"/>
  <rect x="0" y="0" width="1080" height="4" fill="url(#tg)"/>
  <circle cx="540" cy="540" r="600" fill="#4B7BFF" fill-opacity="0.04"/>
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8A6CFF"/><stop offset="100%" stop-color="#4B7BFF"/></linearGradient>
    <linearGradient id="ng" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#A98DFF"/><stop offset="100%" stop-color="#6B9FFF"/></linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8A6CFF"/><stop offset="100%" stop-color="#4B7BFF"/></linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#8A6CFF" stop-opacity="0.2"/><stop offset="100%" stop-color="#8A6CFF" stop-opacity="0"/></radialGradient>
  </defs>
  <!-- Label -->
  <text x="80" y="110" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="400" fill="#374151" letter-spacing="3">THE FULL SYSTEM · JWEBLY</text>
  <line x1="80" y1="128" x2="700" y2="128" stroke="#1B2B45" stroke-width="1"/>
  <!-- Title -->
  <text x="80" y="230" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="64" font-weight="700" fill="white">Your business,</text>
  <text x="80" y="320" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="64" font-weight="700" fill="url(#tg)">fully automated.</text>
  <!-- 8-spoke hub diagram (hub 540,600, d=200) -->
  <circle cx="540" cy="600" r="215" fill="url(#gl)"/>
  <circle cx="540" cy="600" r="120" fill="none" stroke="#8A6CFF" stroke-width="1.2" stroke-opacity="0.16"/>
  <!-- Cardinal spokes -->
  <line x1="540" y1="600" x2="540" y2="400" stroke="#8A6CFF" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="540" y1="600" x2="740" y2="600" stroke="#8A6CFF" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="540" y1="600" x2="540" y2="800" stroke="#8A6CFF" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="540" y1="600" x2="340" y2="600" stroke="#8A6CFF" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Diagonal spokes (d=141, offset=100) -->
  <line x1="540" y1="600" x2="681" y2="459" stroke="#4B7BFF" stroke-width="1.2" stroke-opacity="0.28"/>
  <line x1="540" y1="600" x2="681" y2="741" stroke="#4B7BFF" stroke-width="1.2" stroke-opacity="0.28"/>
  <line x1="540" y1="600" x2="399" y2="741" stroke="#4B7BFF" stroke-width="1.2" stroke-opacity="0.28"/>
  <line x1="540" y1="600" x2="399" y2="459" stroke="#4B7BFF" stroke-width="1.2" stroke-opacity="0.28"/>
  <!-- Cardinal nodes -->
  <circle cx="540" cy="400" r="30" fill="url(#ng)" opacity="0.9"/>
  <circle cx="740" cy="600" r="30" fill="url(#ng)" opacity="0.9"/>
  <circle cx="540" cy="800" r="30" fill="url(#ng)" opacity="0.9"/>
  <circle cx="340" cy="600" r="30" fill="url(#ng)" opacity="0.9"/>
  <!-- Diagonal nodes -->
  <circle cx="681" cy="459" r="18" fill="#4B7BFF" opacity="0.65"/>
  <circle cx="681" cy="741" r="18" fill="#4B7BFF" opacity="0.65"/>
  <circle cx="399" cy="741" r="18" fill="#4B7BFF" opacity="0.65"/>
  <circle cx="399" cy="459" r="18" fill="#4B7BFF" opacity="0.65"/>
  <!-- Node labels -->
  <text x="540" y="372" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="13" font-weight="600" fill="#A98DFF" text-anchor="middle">SALES</text>
  <text x="790" y="605" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="13" font-weight="600" fill="#A98DFF">OPS</text>
  <text x="540" y="860" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="13" font-weight="600" fill="#A98DFF" text-anchor="middle">FINANCE</text>
  <text x="295" y="605" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="13" font-weight="600" fill="#A98DFF" text-anchor="end">CLIENT</text>
  <!-- Hub center -->
  <circle cx="540" cy="600" r="70" fill="url(#mg)"/>
  <text x="540" y="590" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">PRIME</text>
  <text x="540" y="610" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">AGENT</text>
  <!-- Footer -->
  <text x="80" y="980" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="22" font-weight="400" fill="#6B7280">Custom scoped. £249.99/month retainer.</text>
  <text x="80" y="1020" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="22" font-weight="400" fill="#6B7280">3–6 weeks to deployment.</text>
  <text x="80" y="1060" font-family="Inter,-apple-system,system-ui,sans-serif" font-size="18" font-weight="600" fill="#8A6CFF">jwebly.co.uk</text>
</svg>
