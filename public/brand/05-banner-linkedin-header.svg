  <line x1="160" y1="198" x2="260" y2="198" stroke="#8A6CFF" stroke-width="2.4" stroke-opacity="0.48"/>
  <line x1="160" y1="198" x2="160" y2="298" stroke="#8A6CFF" stroke-width="2.4" stroke-opacity="0.48"/>
  <line x1="160" y1="198" x2="60"  y2="198" stroke="#8A6CFF" stroke-width="2.4" stroke-opacity="0.48"/>
