  <line x1="160" y1="198" x2="210" y2="148" stroke="#8A6CFF" stroke-width="1.4" stroke-opacity="0.28"/>
  <line x1="160" y1="198" x2="210" y2="248" stroke="#8A6CFF" stroke-width="1.4" stroke-opacity="0.28"/>
  <line x1="160" y1="198" x2="110" y2="248" stroke="#8A6CFF" stroke-width="1.4" stroke-opacity="0.28"/>
