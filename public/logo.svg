<svg width="220" height="50" viewBox="0 0 220 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8A6CFF"/><stop offset="100%" stop-color="#4B7BFF"/></linearGradient>
    <linearGradient id="ng" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#A98DFF"/><stop offset="100%" stop-color="#6B9FFF"/></linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#8A6CFF" stop-opacity="0.28"/><stop offset="100%" stop-color="#8A6CFF" stop-opacity="0"/></radialGradient>
  </defs>

  <!-- Glow -->
  <circle cx="25" cy="25" r="22" fill="url(#gl)"/>
  <!-- Precision ring -->
  <circle cx="25" cy="25" r="12" fill="none" stroke="#8A6CFF" stroke-width="0.7" stroke-opacity="0.18"/>

  <!-- Primary spokes (cardinal) -->
  <line x1="25" y1="25" x2="25" y2="5"  stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.48"/>
  <line x1="25" y1="25" x2="45" y2="25" stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.48"/>
  <line x1="25" y1="25" x2="25" y2="45" stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.48"/>
  <line x1="25" y1="25" x2="5"  y2="25" stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.48"/>

  <!-- Secondary spokes (diagonal) -->
  <line x1="25" y1="25" x2="35" y2="15" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.28"/>
  <line x1="25" y1="25" x2="35" y2="35" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.28"/>
  <line x1="25" y1="25" x2="15" y2="35" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.28"/>
  <line x1="25" y1="25" x2="15" y2="15" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.28"/>

  <!-- Primary nodes -->
  <circle cx="25" cy="5"  r="4"   fill="url(#ng)" opacity="0.9"/>
  <circle cx="45" cy="25" r="4"   fill="url(#ng)" opacity="0.9"/>
  <circle cx="25" cy="45" r="4"   fill="url(#ng)" opacity="0.9"/>
  <circle cx="5"  cy="25" r="4"   fill="url(#ng)" opacity="0.9"/>

  <!-- Secondary nodes -->
  <circle cx="35" cy="15" r="2.5" fill="url(#ng)" opacity="0.62"/>
  <circle cx="35" cy="35" r="2.5" fill="url(#ng)" opacity="0.62"/>
  <circle cx="15" cy="35" r="2.5" fill="url(#ng)" opacity="0.62"/>
  <circle cx="15" cy="15" r="2.5" fill="url(#ng)" opacity="0.62"/>

  <!-- Hub -->
  <circle cx="25" cy="25" r="8" fill="url(#mg)"/>
  <circle cx="22.5" cy="22.5" r="3" fill="white" fill-opacity="0.13"/>

  <!-- Wordmark -->
  <text x="57" y="29"
    font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
    font-size="19" font-weight="600" fill="white" letter-spacing="2.5">JWEBLY</text>

  <!-- Tagline -->
  <text x="58" y="43"
    font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
    font-size="6.5" font-weight="400" fill="#4B5563" letter-spacing="1.8">OPERATIONAL INTELLIGENCE</text>
</svg>
