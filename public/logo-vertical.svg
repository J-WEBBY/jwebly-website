<svg width="120" height="130" viewBox="0 0 120 130" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A6CFF"/>
      <stop offset="100%" stop-color="#4B7BFF"/>
    </linearGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A98DFF"/>
      <stop offset="100%" stop-color="#6B9FFF"/>
    </linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8A6CFF" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#8A6CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Mark centered at (60, 43) -->
  <!-- Glow -->
  <circle cx="60" cy="43" r="25" fill="url(#gl)"/>
  <!-- Precision ring -->
  <circle cx="60" cy="43" r="13" fill="none" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.18"/>

  <!-- Primary spokes -->
  <line x1="60" y1="43" x2="60" y2="21" stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.48"/>
  <line x1="60" y1="43" x2="82" y2="43" stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.48"/>
  <line x1="60" y1="43" x2="60" y2="65" stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.48"/>
  <line x1="60" y1="43" x2="38" y2="43" stroke="#8A6CFF" stroke-width="1.3" stroke-opacity="0.48"/>

  <!-- Secondary spokes -->
  <line x1="60" y1="43" x2="76" y2="27" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.28"/>
  <line x1="60" y1="43" x2="76" y2="59" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.28"/>
  <line x1="60" y1="43" x2="44" y2="59" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.28"/>
  <line x1="60" y1="43" x2="44" y2="27" stroke="#8A6CFF" stroke-width="0.8" stroke-opacity="0.28"/>

  <!-- Primary nodes -->
  <circle cx="60" cy="21" r="4.5" fill="url(#ng)" opacity="0.9"/>
  <circle cx="82" cy="43" r="4.5" fill="url(#ng)" opacity="0.9"/>
  <circle cx="60" cy="65" r="4.5" fill="url(#ng)" opacity="0.9"/>
  <circle cx="38" cy="43" r="4.5" fill="url(#ng)" opacity="0.9"/>

  <!-- Secondary nodes -->
  <circle cx="76" cy="27" r="3"   fill="url(#ng)" opacity="0.62"/>
  <circle cx="76" cy="59" r="3"   fill="url(#ng)" opacity="0.62"/>
  <circle cx="44" cy="59" r="3"   fill="url(#ng)" opacity="0.62"/>
  <circle cx="44" cy="27" r="3"   fill="url(#ng)" opacity="0.62"/>

  <!-- Hub -->
  <circle cx="60" cy="43" r="9.5" fill="url(#mg)"/>
  <circle cx="57" cy="40" r="3.5" fill="white" fill-opacity="0.12"/>

  <!-- Wordmark -->
  <text x="60" y="104"
    font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
    font-size="20" font-weight="600" fill="white" letter-spacing="2.5" text-anchor="middle">JWEBLY</text>

  <!-- Tagline -->
  <text x="60" y="120"
    font-family="Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
    font-size="7" font-weight="400" fill="#6B7280" letter-spacing="1.5" text-anchor="middle">OPERATIONAL INTELLIGENCE</text>
</svg>
