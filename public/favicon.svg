<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#050810"/>
  <defs>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A6CFF"/>
      <stop offset="100%" stop-color="#4B7BFF"/>
    </linearGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A98DFF"/>
      <stop offset="100%" stop-color="#6B9FFF"/>
    </linearGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8A6CFF" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#8A6CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow -->
  <circle cx="50" cy="50" r="42" fill="url(#gl)"/>
  <!-- Precision ring -->
  <circle cx="50" cy="50" r="23" fill="none" stroke="#8A6CFF" stroke-width="1.2" stroke-opacity="0.2"/>

  <!-- Primary spokes (cardinal) -->
  <line x1="50" y1="50" x2="50" y2="12" stroke="#8A6CFF" stroke-width="2.0" stroke-opacity="0.48"/>
  <line x1="50" y1="50" x2="88" y2="50" stroke="#8A6CFF" stroke-width="2.0" stroke-opacity="0.48"/>
  <line x1="50" y1="50" x2="50" y2="88" stroke="#8A6CFF" stroke-width="2.0" stroke-opacity="0.48"/>
  <line x1="50" y1="50" x2="12" y2="50" stroke="#8A6CFF" stroke-width="2.0" stroke-opacity="0.48"/>

  <!-- Secondary spokes (diagonal) -->
  <line x1="50" y1="50" x2="69" y2="31" stroke="#8A6CFF" stroke-width="1.2" stroke-opacity="0.28"/>
  <line x1="50" y1="50" x2="69" y2="69" stroke="#8A6CFF" stroke-width="1.2" stroke-opacity="0.28"/>
  <line x1="50" y1="50" x2="31" y2="69" stroke="#8A6CFF" stroke-width="1.2" stroke-opacity="0.28"/>
  <line x1="50" y1="50" x2="31" y2="31" stroke="#8A6CFF" stroke-width="1.2" stroke-opacity="0.28"/>

  <!-- Primary nodes -->
  <circle cx="50" cy="12" r="8.5" fill="url(#ng)" opacity="0.9"/>
  <circle cx="88" cy="50" r="8.5" fill="url(#ng)" opacity="0.9"/>
  <circle cx="50" cy="88" r="8.5" fill="url(#ng)" opacity="0.9"/>
  <circle cx="12" cy="50" r="8.5" fill="url(#ng)" opacity="0.9"/>

  <!-- Secondary nodes -->
  <circle cx="69" cy="31" r="5.5" fill="url(#ng)" opacity="0.62"/>
  <circle cx="69" cy="69" r="5.5" fill="url(#ng)" opacity="0.62"/>
  <circle cx="31" cy="69" r="5.5" fill="url(#ng)" opacity="0.62"/>
  <circle cx="31" cy="31" r="5.5" fill="url(#ng)" opacity="0.62"/>

  <!-- Hub -->
  <circle cx="50" cy="50" r="17" fill="url(#mg)"/>
  <circle cx="45" cy="45" r="6"  fill="white" fill-opacity="0.13"/>
</svg>
